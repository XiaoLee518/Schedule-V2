*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

/* ══════════ LIGHT MODE ══════════ */
:root{
–bg:#f5f5f7;
–card:#ffffff;
–sep:rgba(0,0,0,0.06);
–sep2:rgba(0,0,0,0.03);
–text:#1d1d1f;
–text2:#424245;
–muted:#86868b;
–accent:#0066cc;
–green:#28a745;
–orange:#e67700;
–red:#dc3545;
–purple:#9333ea;
–teal:#0891b2;
–yellow:#ca8a04;
–tab-h:56px;
–header-h:52px;
–glass-bg:rgba(255,255,255,0.7);
–glass-border:rgba(255,255,255,0.3);
–glass-highlight:rgba(255,255,255,0.4);
–glass-shadow:rgba(0,0,0,0.08);
}

/* ══════════ DARK MODE ══════════ */
:root.dark{
–bg:#000000;
–card:#1c1c1e;
–sep:rgba(255,255,255,0.08);
–sep2:rgba(255,255,255,0.04);
–text:#f5f5f7;
–text2:#d1d1d6;
–muted:#8e8e93;
–accent:#0a84ff;
–green:#30d158;
–orange:#ff9f0a;
–red:#ff453a;
–purple:#bf5af2;
–teal:#5ac8fa;
–yellow:#ffd60a;
–glass-bg:rgba(28,28,30,0.7);
–glass-border:rgba(255,255,255,0.1);
–glass-highlight:rgba(255,255,255,0.1);
–glass-shadow:rgba(0,0,0,0.3);
}

html,body{height:100%;overflow:hidden;background:var(–bg);font-family:‘Noto Sans TC’,sans-serif;color:var(–text);transition:background .3s,color .3s;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.safe-top{height:env(safe-area-inset-top,44px);background:var(–bg);}
.safe-bot{height:env(safe-area-inset-bottom,20px);background:var(–bg);}

/* ── HEADER ── */
header{
height:var(–header-h);padding:0 16px;
display:flex;align-items:center;justify-content:space-between;
background:var(–glass-bg);
backdrop-filter:blur(24px) saturate(180%);
-webkit-backdrop-filter:blur(24px) saturate(180%);
border-bottom:0.5px solid var(–sep);
flex-shrink:0;
}
.h-title{font-size:22px;font-weight:700;letter-spacing:-0.4px;}
.h-btn{
width:32px;height:32px;border-radius:16px;
background:var(–sep2);border:none;
font-size:15px;cursor:pointer;color:var(–accent);
display:flex;align-items:center;justify-content:center;
transition:background .15s,transform .15s;
}
.h-btn:active{background:var(–sep);transform:scale(0.94);}
.h-btn svg{width:18px;height:18px;fill:var(–accent);}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}
.view.active{display:flex;}

/* ══════════ WEEKLY ══════════ */
#weekly-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.week-grid{
display:grid;
grid-template-columns:42px repeat(5,1fr);
padding:6px 10px 10px;
gap:4px;
}
.wg-head{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:4px 2px 6px;
font-size:10.5px;font-weight:600;color:var(–muted);letter-spacing:.8px;
text-transform:uppercase;
}
.wg-today-dot{
width:24px;height:24px;border-radius:50%;
background:var(–accent);color:#fff;
display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:700;margin-top:3px;
}
.wg-head.today{color:var(–accent);}

.wg-time{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:1px 0;position:relative;
}
.wg-time.today{background:var(–sep2);border-radius:8px;}
.wg-pn{font-size:13px;font-weight:700;color:var(–text2);}
.wg-time.today .wg-pn{color:var(–accent);}
.wg-pt{font-size:8px;color:var(–muted);line-height:1.4;text-align:center;margin-top:1px;}

/* ═══ LIQUID GLASS EFFECT ═══ */
.wg-cell{
min-height:72px;border-radius:14px;
display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;padding:6px 3px;
font-size:10.5px;font-weight:500;line-height:1.4;
position:relative;overflow:hidden;
cursor:pointer;transition:transform .15s ease;
border:1px solid var(–glass-border);
box-shadow:
0 4px 16px var(–glass-shadow),
0 1px 3px var(–glass-shadow),
inset 0 1px 0 var(–glass-highlight);
backdrop-filter:blur(10px) saturate(150%);
-webkit-backdrop-filter:blur(10px) saturate(150%);
}
.wg-cell::before{
content:’’;
position:absolute;
top:-50%;left:-50%;
width:200%;height:200%;
background:linear-gradient(135deg,
var(–glass-highlight) 0%,
transparent 50%);
transform:rotate(45deg);
pointer-events:none;
opacity:0.5;
}
.wg-cell::after{
content:’’;
position:absolute;
inset:0;
border-radius:14px;
background:linear-gradient(to bottom,
var(–glass-highlight) 0%,
transparent 50%);
pointer-events:none;
}
.wg-cell:active{transform:scale(0.94);}
.wg-cell-bar{position:absolute;left:0;top:0;bottom:0;width:3px;z-index:2;border-radius:0 2px 2px 0;}
.wg-cell-content{position:relative;z-index:3;text-shadow:0 1px 2px rgba(0,0,0,0.1);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
:root.dark .wg-cell-content{text-shadow:0 1px 3px rgba(0,0,0,0.4);}
.wg-cell-name{font-weight:600;}
.wg-cell-note{font-size:9px;color:var(–muted);margin-top:2px;opacity:0.8;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wg-cell.empty{
background:transparent;
box-shadow:none;
cursor:default;
border:none;
backdrop-filter:none;
}
.wg-cell.empty::before,
.wg-cell.empty::after{display:none;}

.wg-lunch{
grid-column:1/-1;
background:var(–sep2);
border:1px dashed var(–sep);
border-radius:8px;
display:flex;align-items:center;justify-content:center;
padding:5px;margin:1px 0;
font-size:10.5px;color:var(–muted);font-weight:500;letter-spacing:.2px;
}

/* ══════════ TODAY ══════════ */
#today-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}

.sec-hd{font-size:22px;font-weight:700;letter-spacing:-.3px;padding:16px 0 4px;}
.sec-sub{font-size:13px;color:var(–muted);margin-bottom:12px;}

.now-card{
background:var(–card);border-radius:18px;padding:16px 16px 14px;
box-shadow:0 2px 14px var(–glass-shadow);margin-bottom:10px;
border:1px solid var(–sep);
}
.now-status{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(–green);margin-bottom:9px;}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(–green);animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
.now-remain{margin-left:auto;font-size:12px;font-weight:400;color:var(–muted);}
.now-title{font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:9px;}
.prog-track{height:3.5px;background:var(–sep);border-radius:2px;margin-bottom:11px;}
.prog-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.now-meta{display:flex;gap:16px;flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:4px;font-size:13px;color:var(–muted);}

.next-card{
background:var(–card);border-radius:14px;padding:11px 14px;
box-shadow:0 1px 6px var(–glass-shadow);margin-bottom:16px;
display:flex;align-items:center;gap:10px;
border:1px solid var(–sep);
}
.next-lbl{font-size:11px;font-weight:700;color:var(–orange);white-space:nowrap;}
.next-div{width:1px;height:28px;background:var(–sep);}
.next-sub{font-size:14px;font-weight:600;}
.next-t{font-size:11.5px;color:var(–muted);margin-top:2px;}

.no-card{
background:var(–card);border-radius:18px;padding:28px;text-align:center;
box-shadow:0 1px 6px var(–glass-shadow);margin-bottom:12px;
border:1px solid var(–sep);
}
.no-txt{font-size:16px;font-weight:700;}
.no-sub{font-size:13px;color:var(–muted);margin-top:4px;}

.sch-list{background:var(–sep2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;gap:.5px;box-shadow:0 1px 6px var(–glass-shadow);}
.sch-row{background:var(–card);padding:11px 14px;display:flex;align-items:center;gap:11px;}
.sch-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sch-info{flex:1;min-width:0;}
.sch-name{font-size:14px;font-weight:500;}
.sch-name.past{color:var(–muted);}
.sch-t{font-size:11.5px;color:var(–muted);margin-top:2px;}
.badge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.b-now{background:rgba(40,167,69,.12);color:var(–green);}
.b-next{background:rgba(230,119,0,.1);color:var(–orange);}
.b-done{background:var(–sep2);color:var(–muted);}

/* ══════════ TODO ══════════ */
#todo-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}

.urgent-banner{
background:var(–sep2);
border:1px solid var(–sep);
border-radius:14px;padding:11px 14px;margin:14px 0 0;
}
.urgent-banner-hd{font-size:12px;font-weight:700;color:var(–red);margin-bottom:5px;}
.urgent-item-txt{font-size:13px;color:var(–text);margin:2px 0;}

.todo-list{background:var(–sep2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;gap:.5px;box-shadow:0 1px 6px var(–glass-shadow);}
.todo-row{background:var(–card);padding:12px 14px;display:flex;align-items:center;gap:12px;}
.check-btn{
width:24px;height:24px;border-radius:50%;border:2px solid var(–sep);
flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:all .2s;
}
.check-btn.done{
background:var(–green);border-color:var(–green);
}
.check-btn.done::after{
content:’’;width:10px;height:6px;
border-left:2px solid #fff;border-bottom:2px solid #fff;
transform:rotate(-45deg) translateY(-1px);
}
.todo-info{flex:1;min-width:0;}
.todo-name{font-size:14px;font-weight:500;transition:all .2s;}
.todo-name.done{color:var(–muted);text-decoration:line-through;}
.todo-due{font-size:11.5px;color:var(–muted);margin-top:2px;}
.todo-due.urg{color:var(–red);font-weight:600;}

.event-list{background:var(–sep2);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;gap:.5px;box-shadow:0 1px 6px var(–glass-shadow);margin-bottom:8px;}
.ev-row{background:var(–card);padding:11px 14px;display:flex;align-items:center;gap:11px;}
.ev-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0;}
.ev-info{flex:1;min-width:0;}
.ev-name{font-size:14px;font-weight:500;}
.ev-date{font-size:11.5px;color:var(–muted);margin-top:2px;}
.ev-tag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.t-hol{background:var(–sep2);color:var(–red);}
.t-exam{background:var(–sep2);color:var(–purple);}
.t-ev{background:var(–sep2);color:var(–accent);}

.add-btn{
width:100%;padding:11px;background:var(–card);border:1.5px dashed var(–sep);
border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px;
color:var(–accent);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;
transition:all .15s;
}
.add-btn:active{background:var(–sep2);transform:scale(0.98);}
.add-ic{font-size:18px;font-weight:300;}
.add-txt{font-family:‘Noto Sans TC’,sans-serif;}

/* ══════════ SETTINGS ══════════ */
#settings-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px;}

.settings-section{margin-bottom:24px;}
.settings-section-title{font-size:13px;font-weight:700;color:var(–muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 4px;}

.settings-card{
background:var(–card);border-radius:14px;padding:14px 16px;
box-shadow:0 1px 6px var(–glass-shadow);
border:1px solid var(–sep);
margin-bottom:12px;
}

.day-edit-card{
background:var(–card);border-radius:14px;
box-shadow:0 1px 6px var(–glass-shadow);
border:1px solid var(–sep);
margin-bottom:12px;
overflow:hidden;
}
.day-edit-header{
font-size:16px;font-weight:700;padding:14px 16px;
color:var(–text);display:flex;align-items:center;justify-content:space-between;
cursor:pointer;user-select:none;
transition:background .2s;
}
.day-edit-header:active{background:var(–sep2);}
.day-edit-header-left{display:flex;align-items:center;gap:8px;}
.day-edit-chevron{
width:20px;height:20px;
transition:transform .3s ease;
fill:var(–muted);
}
.day-edit-card.collapsed .day-edit-chevron{transform:rotate(-90deg);}
.day-edit-content{
padding:0 16px 14px;
max-height:2000px;
overflow:hidden;
transition:max-height .3s ease, padding .3s ease;
}
.day-edit-card.collapsed .day-edit-content{
max-height:0;
padding:0 16px;
}
.period-edit-row{
background:var(–sep2);border-radius:10px;padding:10px 12px;margin-bottom:8px;
}
.period-edit-row:last-child{margin-bottom:0;}
.period-edit-label{font-size:11px;color:var(–muted);font-weight:600;margin-bottom:4px;}
.period-edit-inputs{display:flex;gap:8px;margin-bottom:6px;}
.period-edit-input{
flex:1;padding:8px 10px;border:1px solid var(–sep);border-radius:8px;
font-size:13px;font-family:‘Noto Sans TC’,sans-serif;
background:var(–card);transition:border-color .2s;
}
.period-edit-input:focus{outline:none;border-color:var(–accent);}
.period-note-textarea{
width:100%;padding:8px 10px;border:1px solid var(–sep);border-radius:8px;
font-size:12px;font-family:‘Noto Sans TC’,sans-serif;resize:none;
background:var(–card);min-height:50px;transition:border-color .2s;
}
.period-note-textarea:focus{outline:none;border-color:var(–accent);}

.time-edit-section{margin-bottom:16px;}
.time-edit-row{display:flex;gap:10px;margin-bottom:8px;align-items:center;}
.time-edit-label{font-size:13px;font-weight:600;width:60px;}
.time-edit-input{
padding:8px 10px;border:1px solid var(–sep);border-radius:8px;
font-size:13px;font-family:‘Noto Sans TC’,sans-serif;
background:var(–card);transition:border-color .2s;width:80px;
}
.time-edit-input:focus{outline:none;border-color:var(–accent);}

.save-settings-btn{
width:100%;padding:14px;background:var(–accent);color:#fff;
border:none;border-radius:12px;font-size:15px;font-weight:600;
font-family:‘Noto Sans TC’,sans-serif;cursor:pointer;
box-shadow:0 2px 8px rgba(0,102,204,0.3);
transition:all .2s;
}
.save-settings-btn:active{transform:scale(0.98);box-shadow:0 1px 4px rgba(0,102,204,0.3);}

.export-import-btns{display:flex;gap:10px;margin-top:12px;}
.export-btn,.import-btn{
flex:1;padding:12px;border:1px solid var(–sep);
border-radius:10px;background:var(–card);color:var(–text);
font-size:14px;font-weight:600;font-family:‘Noto Sans TC’,sans-serif;
cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.export-btn:active,.import-btn:active{background:var(–sep2);transform:scale(0.98);}

.icon-upload-section{display:flex;align-items:center;gap:12px;padding:12px 0;}
.icon-preview{width:60px;height:60px;border-radius:12px;background:var(–sep2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.icon-preview img{width:100%;height:100%;object-fit:cover;}
.icon-upload-info{flex:1;}
.icon-upload-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.icon-upload-desc{font-size:12px;color:var(–muted);}
.icon-upload-btn{
padding:8px 14px;border:1px solid var(–sep);border-radius:8px;
background:var(–card);color:var(–accent);font-size:13px;font-weight:600;
cursor:pointer;transition:all .15s;
}
.icon-upload-btn:active{background:var(–sep2);}

/* ══════════ TAB BAR ══════════ */
.tab-bar{
height:var(–tab-h);
background:var(–glass-bg);
backdrop-filter:blur(24px) saturate(180%);
-webkit-backdrop-filter:blur(24px) saturate(180%);
border-top:0.5px solid var(–sep);
display:flex;padding:0 8px;flex-shrink:0;
}
.tab{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
cursor:pointer;gap:2px;transition:all .2s;
}
.tab-icon{
width:28px;height:28px;display:flex;align-items:center;justify-content:center;
transition:transform .2s;
}
.tab-icon svg{width:24px;height:24px;fill:var(–muted);transition:fill .2s;}
.tab.active .tab-icon svg{fill:var(–accent);}
.tab.active .tab-icon{transform:scale(1.1);}
.tab-lbl{
font-size:10px;font-weight:600;color:var(–muted);
transition:color .2s;letter-spacing:.3px;
}
.tab.active .tab-lbl{color:var(–accent);}

/* ══════════ MODAL ══════════ */
.modal{
display:none;position:fixed;inset:0;z-index:1000;
background:rgba(0,0,0,0.5);
align-items:center;justify-content:center;
padding:20px;
}
.modal.show{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-body{
background:var(–card);border-radius:20px;width:100%;max-width:400px;
padding:20px;box-shadow:0 12px 40px rgba(0,0,0,0.4);
animation:slideUp .3s;
border:1px solid var(–sep);
max-height:80vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-hd{font-size:20px;font-weight:700;margin-bottom:16px;text-align:center;}
.modal-label{font-size:13px;color:var(–muted);font-weight:600;margin-bottom:6px;margin-top:10px;}
.modal-label:first-of-type{margin-top:0;}
.modal-input{
width:100%;padding:11px 14px;border:1px solid var(–sep);border-radius:10px;
font-size:14px;font-family:‘Noto Sans TC’,sans-serif;margin-bottom:10px;
background:var(–bg);transition:border-color .2s;
}
.modal-input:focus{outline:none;border-color:var(–accent);}
.modal-select{
width:100%;padding:11px 14px;border:1px solid var(–sep);border-radius:10px;
font-size:14px;font-family:‘Noto Sans TC’,sans-serif;margin-bottom:10px;
background:var(–bg);cursor:pointer;transition:border-color .2s;
}
.modal-select:focus{outline:none;border-color:var(–accent);}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.modal-btn{
flex:1;padding:12px;border:none;border-radius:10px;
font-size:14px;font-weight:600;font-family:‘Noto Sans TC’,sans-serif;
cursor:pointer;transition:all .15s;
}
.modal-btn.cancel{background:var(–sep2);color:var(–text);}
.modal-btn.cancel:active{background:var(–sep);}
.modal-btn.save{background:var(–accent);color:#fff;}
.modal-btn.save:active{transform:scale(0.98);}

/* ══════════ TOAST ══════════ */
.toast{
position:fixed;bottom:calc(var(–tab-h) + 20px);left:50%;
transform:translateX(-50%) translateY(100px);
background:var(–card);color:var(–text);
padding:11px 18px;border-radius:20px;
font-size:13px;font-weight:500;
box-shadow:0 8px 24px rgba(0,0,0,0.4);
border:1px solid var(–sep);
opacity:0;pointer-events:none;
transition:all .3s cubic-bezier(.4,0,.2,1);
z-index:2000;
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
}
.toast.show{
opacity:1;transform:translateX(-50%) translateY(0);
}

/* ══════════ TOGGLE ══════════ */
.notif-toggle{
width:48px;height:28px;border-radius:14px;
background:var(–sep);position:relative;cursor:pointer;
transition:background .3s;flex-shrink:0;
}
.notif-toggle.on{background:var(–green);}
.notif-toggle::after{
content:’’;position:absolute;
width:24px;height:24px;border-radius:50%;
background:#fff;top:2px;left:2px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
transition:transform .3s;
}
.notif-toggle.on::after{transform:translateX(20px);}
</style>

</head>

<script>
// ═══ DATA ═══
const DOW_ZH=['日','一','二','三','四','五','六'];
const DOW=['SUN','MON','TUE','WED','THU','FRI'];

const DEFAULT_PERIODS=[
{n:1,s:'08:10',e:'09:00',sh:8,sm:10,eh:9,em:0},
{n:2,s:'09:10',e:'10:00',sh:9,sm:10,eh:10,em:0},
{n:3,s:'10:10',e:'11:00',sh:10,sm:10,eh:11,em:0},
{n:4,s:'11:10',e:'12:00',sh:11,sm:10,eh:12,em:0},
{n:5,s:'13:10',e:'14:00',sh:13,sm:10,eh:14,em:0},
{n:6,s:'14:10',e:'15:00',sh:14,sm:10,eh:15,em:0},
{n:7,s:'15:10',e:'16:00',sh:15,sm:10,eh:16,em:0},
{n:8,s:'16:10',e:'17:00',sh:16,sm:10,eh:17,em:0},
];

const DEFAULT_CLASSES=[
['國文','英文','數學','歷史','生物'],
['數學','體育','國文','地理','化學'],
['英文','數學','公民','物理','國文'],
['歷史','化學','英文','數學','體育'],
['生物','地理','數學','國文','英文'],
['數學','國文','體育','英文','物理'],
['公民','英文','生物','化學','數學'],
['體育','數學','國文','英文','地理'],
];

let S={
todos:[],
events:[],
notif:false,
darkMode:false,
customIcon:null,
periods:null,
classes:null,
notes:null,
};

function ld(){
try{
const d=localStorage.getItem('scheduleData');
if(d){
const parsed=JSON.parse(d);
S={...S,...parsed};
if(!S.periods)S.periods=JSON.parse(JSON.stringify(DEFAULT_PERIODS));
if(!S.classes)S.classes=JSON.parse(JSON.stringify(DEFAULT_CLASSES));
if(!S.notes){
// Initialize notes: 8 periods x 5 days
S.notes=[];
for(let p=0;p<8;p++){
S.notes[p]=[];
for(let d=0;d<5;d++){
S.notes[p][d]='';
}
}
}
}else{
S.periods=JSON.parse(JSON.stringify(DEFAULT_PERIODS));
S.classes=JSON.parse(JSON.stringify(DEFAULT_CLASSES));
S.notes=[];
for(let p=0;p<8;p++){
S.notes[p]=[];
for(let d=0;d<5;d++){
S.notes[p][d]='';
}
}
}
}catch(e){
console.error('Load error:',e);
S.periods=JSON.parse(JSON.stringify(DEFAULT_PERIODS));
S.classes=JSON.parse(JSON.stringify(DEFAULT_CLASSES));
S.notes=[];
for(let p=0;p<8;p++){
S.notes[p]=[];
for(let d=0;d<5;d++){
S.notes[p][d]='';
}
}
}
}
function sv(){localStorage.setItem('scheduleData',JSON.stringify(S));}
ld();

// ═══ HELPERS ═══
let uid_c=Date.now();
function uid(){return uid_c++;}
function col(){const d=new Date().getDay();return d===0||d===6?-1:d-1;}
function nm(){const n=new Date();return n.getHours()*60+n.getMinutes();}

const SUBJ_COLORS={
'國文':{bg:'rgba(230,119,0,0.10)',bar:'#d97706'},
'英文':{bg:'rgba(0,102,204,0.10)',bar:'#0066cc'},
'數學':{bg:'rgba(220,53,69,0.10)',bar:'#dc3545'},
'物理':{bg:'rgba(147,51,234,0.10)',bar:'#9333ea'},
'化學':{bg:'rgba(40,167,69,0.10)',bar:'#28a745'},
'生物':{bg:'rgba(8,145,178,0.10)',bar:'#0891b2'},
'歷史':{bg:'rgba(202,138,4,0.10)',bar:'#ca8a04'},
'地理':{bg:'rgba(239,68,68,0.10)',bar:'#ef4444'},
'公民':{bg:'rgba(59,130,246,0.10)',bar:'#3b82f6'},
'體育':{bg:'rgba(34,197,94,0.10)',bar:'#22c55e'},
};

const SUBJ_COLORS_DARK={
'國文':{bg:'rgba(255,159,10,0.15)',bar:'#ff9f0a'},
'英文':{bg:'rgba(10,132,255,0.15)',bar:'#0a84ff'},
'數學':{bg:'rgba(255,69,58,0.15)',bar:'#ff453a'},
'物理':{bg:'rgba(191,90,242,0.15)',bar:'#bf5af2'},
'化學':{bg:'rgba(48,209,88,0.15)',bar:'#30d158'},
'生物':{bg:'rgba(90,200,250,0.15)',bar:'#5ac8fa'},
'歷史':{bg:'rgba(255,214,10,0.15)',bar:'#ffd60a'},
'地理':{bg:'rgba(255,55,95,0.15)',bar:'#ff375f'},
'公民':{bg:'rgba(100,210,255,0.15)',bar:'#64d2ff'},
'體育':{bg:'rgba(50,215,75,0.15)',bar:'#32d74b'},
};

function cc(s){
const isDark=document.documentElement.classList.contains('dark');
const colors=isDark?SUBJ_COLORS_DARK:SUBJ_COLORS;
return colors[s]||{bg:isDark?'rgba(142,142,147,0.15)':'rgba(120,120,128,0.10)',bar:'#8e8e93'};
}

function fdue(d){
const now=new Date(),due=new Date(d);
const diff=due-now,days=Math.floor(diff/86400000),hrs=Math.floor(diff/3600000);
if(diff<0)return'已過期';
if(days===0)return hrs<1?'1小時內':`${hrs}小時後`;
return`${days}天後`;
}
function urgent(t){
const diff=new Date(t.due)-new Date();
return!t.done&&diff>0&&diff<172800000;
}
function fedate(d){
const dt=new Date(d+'T00:00:00');
return`${dt.getMonth()+1}月${dt.getDate()}日 (${DOW_ZH[dt.getDay()]})`;
}

function toast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}

function openM(id){document.getElementById(id).classList.add('show');}
function closeM(id){document.getElementById(id).classList.remove('show');}

// ═══ WEEKLY ═══
function renderWeekly(){
const today=new Date().getDay();
const c=col();
let h='';

// Headers
h+='<div class="wg-head"></div>';
for(let i=0;i<5;i++){
const isToday=(i===c);
h+=`<div class="wg-head${isToday?' today':''}">
${DOW[i+1]}<br>
${isToday?`<div class="wg-today-dot">${new Date().getDate()}</div>`:''}
</div>`;
}

// Periods
S.periods.forEach((p,pi)=>{
const isToday=(col()!==-1);
h+=`<div class="wg-time${isToday&&c!==-1&&pi<8?' today':''}">
<div class="wg-pn">${p.n}</div>
<div class="wg-pt">${p.s}<br>${p.e}</div>
</div>`;

for(let d=0;d<5;d++){
const cls=S.classes[pi][d];
const note=S.notes[pi][d];
const co=cc(cls);
h+=`<div class="wg-cell" style="background:${co.bg};">
<div class="wg-cell-bar" style="background:${co.bar};"></div>
<div class="wg-cell-content">
<div class="wg-cell-name">${cls}</div>
${note?`<div class="wg-cell-note">${note}</div>`:''}
</div>
</div>`;
}

if(pi===3){
h+=`<div class="wg-lunch">12:00 – 13:00 午休</div>`;
}
});

document.getElementById('weekGrid').innerHTML=h;
}

// ═══ TODAY ═══
function renderToday(){
const now=new Date();
const c=col();
const n=nm();
let h=`<div class="sec-hd">今天</div>
<div class="sec-sub">${now.getMonth()+1} 月 ${now.getDate()} 日 · 星期${DOW_ZH[now.getDay()]}</div>`;

if(c===-1){
h+=`<div class="no-card"><div class="no-txt">今天是週末</div><div class="no-sub">好好休息！</div></div>`;
document.getElementById('todayContent').innerHTML=h;
return;
}

let ci=-1,ni=-1;
S.periods.forEach((p,i)=>{
const st=p.sh*60+p.sm,en=p.eh*60+p.em;
if(n>=st&&n<=en)ci=i;
if(ni===-1&&n<st)ni=i;
});

if(ci!==-1){
const p=S.periods[ci];const cls=S.classes[ci][c];const co=cc(cls);
const st=p.sh*60+p.sm,en=p.eh*60+p.em;
const pct=Math.min(100,Math.round((n-st)/(en-st)*100));
h+=`<div class="now-card">
<div class="now-status"><div class="pulse-dot"></div>上課中<span class="now-remain">剩餘 ${en-n} 分鐘</span></div>
<div class="now-title">${cls}</div>
<div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${co.bar};"></div></div>
<div class="now-meta">
<div class="meta-item">${p.s} – ${p.e}</div>
<div class="meta-item">· 第 ${p.n} 節</div>
</div>
</div>`;
} else {
const lunch=n>=720&&n<800;
h+=`<div class="no-card">
<div class="no-txt">${lunch?'午休時間':'目前沒有課'}</div>
<div class="no-sub">${ni!==-1?`下一節 ${S.periods[ni].s} 開始`:'今天課程已結束'}</div>
</div>`;
}

if(ni!==-1){
const p=S.periods[ni];const cls=S.classes[ni][c];
h+=`<div class="next-card">
<div class="next-lbl">下一堂 · ${p.s}</div>
<div class="next-div"></div>
<div><div class="next-sub">${cls}</div><div class="next-t">第 ${p.n} 節 · ${p.s} – ${p.e}</div></div>
</div>`;
}

h+=`<div class="sec-hd" style="font-size:18px;padding-top:4px;">今日全部課程</div>
<div class="sch-list">`;
S.periods.forEach((p,i)=>{
const cls=S.classes[i][c];const co=cc(cls);
const st=p.sh*60+p.sm,en=p.eh*60+p.em;
const past=n>en,cur=n>=st&&n<=en,nxt=!past&&!cur&&i===ni;
h+=`<div class="sch-row">
<div class="sch-dot" style="background:${co.bar};"></div>
<div class="sch-info">
<div class="sch-name${past?' past':''}">${cls}</div>
<div class="sch-t">第${p.n}節 · ${p.s} – ${p.e}</div>
</div>
${cur?'<div class="badge b-now">進行中</div>':nxt?'<div class="badge b-next">下一堂</div>':past?'<div class="badge b-done">已結束</div>':''}
</div>`;
});
h+='</div>';
document.getElementById('todayContent').innerHTML=h;
}

// ═══ TODO ═══
function renderTodo(){
const now=new Date();
let h='';
const urg=S.todos.filter(urgent);
if(urg.length){
h+=`<div class="urgent-banner" style="margin-top:14px;"><div class="urgent-banner-hd">即將到期</div>`;
urg.forEach(t=>{h+=`<div class="urgent-item-txt">${t.title} <span style="color:var(--red)">· ${fdue(t.due)}</span></div>`;});
h+='</div>';
}
h+=`<div class="sec-hd" style="padding-top:${urg.length?'12px':'16px'};">待辦事項</div>`;
const sorted=[...S.todos.filter(t=>!t.done),...S.todos.filter(t=>t.done)];
h+='<div class="todo-list">';
if(!sorted.length) h+=`<div style="background:var(--card);padding:24px;text-align:center;color:var(--muted);font-size:14px;">全部完成了！</div>`;
sorted.forEach(t=>{
const u=urgent(t);
h+=`<div class="todo-row">
<div class="check-btn${t.done?' done':''}" onclick="toggleTodo(${t.id})"></div>
<div class="todo-info">
<div class="todo-name${t.done?' done':''}">${t.title}</div>
<div class="todo-due${u?' urg':''}">${t.subject?t.subject+' · ':''}${fdue(t.due)}</div>
</div>
</div>`;
});
h+='</div>';
h+=`<button class="add-btn" onclick="openM('todoModal')"><div class="add-ic">+</div><div class="add-txt">新增待辦事項</div></button>`;
h+=`<div class="sec-hd" style="padding-top:20px;">近期行程</div>`;
const evs=S.events.filter(e=>new Date(e.date+'T23:59:59')>=now).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,10);
h+='<div class="event-list">';
if(!evs.length) h+=`<div style="background:var(--card);padding:24px;text-align:center;color:var(--muted);font-size:14px;">沒有近期行程</div>`;
const ecols={holiday:'var(--red)',exam:'var(--purple)',ev:'var(--accent)'};
const etags={holiday:'假日',exam:'考試',ev:'行程'};
const ecls={holiday:'t-hol',exam:'t-exam',ev:'t-ev'};
evs.forEach(ev=>{
const k=ev.type==='holiday'?'holiday':ev.type==='exam'?'exam':'ev';
h+=`<div class="ev-row">
<div class="ev-bar" style="background:${ecols[k]};"></div>
<div class="ev-info"><div class="ev-name">${ev.title}</div><div class="ev-date">${fedate(ev.date)}</div></div>
<div class="ev-tag ${ecls[k]}">${etags[k]}</div>
</div>`;
});
h+='</div>';
h+=`<button class="add-btn" onclick="openM('evModal')" style="margin-top:8px;"><div class="add-ic">+</div><div class="add-txt">新增行程</div></button>`;
document.getElementById('todoContent').innerHTML=h;
}

function toggleTodo(id){
const t=S.todos.find(x=>x.id===id);
if(t){t.done=!t.done;sv();renderTodo();toast(t.done?'已完成':'已取消');}
}
function saveTodo(){
const title=document.getElementById('tTitle').value.trim();
const subj=document.getElementById('tSubj').value.trim();
const due=document.getElementById('tDue').value;
const remind=parseInt(document.getElementById('tRemind').value);
if(!title||!due){toast('請填寫標題和截止時間');return;}
S.todos.push({id:uid(),title,subject:subj,due,done:false,reminderMinutes:remind});
sv();closeM('todoModal');renderTodo();
['tTitle','tSubj','tDue'].forEach(id=>document.getElementById(id).value='');
document.getElementById('tRemind').value='0';
toast('已新增');
schedTodoReminders();
}
function saveEvent(){
const title=document.getElementById('eTitle').value.trim();
const date=document.getElementById('eDate').value;
const type=document.getElementById('eType').value;
if(!title||!date){toast('請填寫標題和日期');return;}
S.events.push({id:uid(),title,date,type});
sv();closeM('evModal');renderTodo();
['eTitle','eDate'].forEach(id=>document.getElementById(id).value='');
toast('已新增行程');
}

// ═══ SETTINGS ═══
function renderTimeEdit(){
let h='';
S.periods.forEach((p,i)=>{
h+=`<div class="time-edit-row">
<div class="time-edit-label">第 ${p.n} 節</div>
<input type="time" class="time-edit-input" data-period="${i}" data-field="start" value="${p.s}">
<span style="color:var(--muted);font-size:13px;">–</span>
<input type="time" class="time-edit-input" data-period="${i}" data-field="end" value="${p.e}">
</div>`;
});
document.getElementById('timeEditSection').innerHTML=h;
}

function renderSettings(){
let h='';

// 按天數編輯，只展開第一天
for(let d=0;d<5;d++){
const isFirst=d===0;
h+=`<div class="day-edit-card${isFirst?'':' collapsed'}" data-day="${d}">
<div class="day-edit-header" onclick="toggleDay(${d})">
<div class="day-edit-header-left">
<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
<path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V9h14v10z"/>
</svg>
星期${DOW_ZH[d+1]}
</div>
<svg class="day-edit-chevron" viewBox="0 0 24 24">
<path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
</svg>
</div>
<div class="day-edit-content">`;

S.periods.forEach((p,pi)=>{
h+=`<div class="period-edit-row">
<div class="period-edit-label">第 ${p.n} 節 · ${p.s} – ${p.e}</div>
<div class="period-edit-inputs">
<input type="text" class="period-edit-input" data-period="${pi}" data-day="${d}" placeholder="科目名稱" value="${S.classes[pi][d]}">
</div>
<textarea class="period-note-textarea" data-period="${pi}" data-day="${d}" placeholder="備註（作業、考試提醒等）">${S.notes[pi][d]}</textarea>

</div>`;
});

h+=`</div></div>`;
}

document.getElementById(‘settingsContent’).innerHTML=h;
}

function toggleDay(dayIndex){
const cards=document.querySelectorAll(’.day-edit-card’);
const card=cards[dayIndex];
card.classList.toggle(‘collapsed’);
}

function saveSettings(){
// Save time edits
document.querySelectorAll(’[data-field=“start”]’).forEach(input=>{
const pi=parseInt(input.dataset.period);
const val=input.value;
S.periods[pi].s=val;
const [h,m]=val.split(’:’).map(Number);
S.periods[pi].sh=h;
S.periods[pi].sm=m;
});
document.querySelectorAll(’[data-field=“end”]’).forEach(input=>{
const pi=parseInt(input.dataset.period);
const val=input.value;
S.periods[pi].e=val;
const [h,m]=val.split(’:’).map(Number);
S.periods[pi].eh=h;
S.periods[pi].em=m;
});

// Save class names
document.querySelectorAll(’.period-edit-input’).forEach(input=>{
const pi=parseInt(input.dataset.period);
const d=parseInt(input.dataset.day);
S.classes[pi][d]=input.value.trim()||’’;
});

// Save notes
document.querySelectorAll(’.period-note-textarea’).forEach(textarea=>{
const pi=parseInt(textarea.dataset.period);
const d=parseInt(textarea.dataset.day);
S.notes[pi][d]=textarea.value.trim();
});

sv();
renderWeekly();
renderToday();
toast(‘設定已儲存’);
}

// ═══ EXPORT/IMPORT ═══
function exportData(){
const data={
version:‘1.0’,
exportDate:new Date().toISOString(),
periods:S.periods,
classes:S.classes,
notes:S.notes,
todos:S.todos,
events:S.events,
};
const blob=new Blob([JSON.stringify(data,null,2)],{type:‘application/json’});
const url=URL.createObjectURL(blob);
const a=document.createElement(‘a’);
a.href=url;
a.download=`課程表_${new Date().toISOString().split('T')[0]}.json`;
a.click();
URL.revokeObjectURL(url);
toast(‘已匯出資料’);
}

document.getElementById(‘importInput’).addEventListener(‘change’,async(e)=>{
const file=e.target.files[0];
if(!file)return;
try{
const text=await file.text();
const data=JSON.parse(text);
if(data.periods)S.periods=data.periods;
if(data.classes)S.classes=data.classes;
if(data.notes)S.notes=data.notes;
if(data.todos)S.todos=data.todos;
if(data.events)S.events=data.events;
sv();
renderWeekly();
renderToday();
renderTodo();
renderSettings();
renderTimeEdit();
toast(‘已匯入資料’);
}catch(err){
toast(‘匯入失敗，請檢查檔案格式’);
console.error(err);
}
e.target.value=’’;
});

// ═══ ICON UPLOAD ═══
document.getElementById(‘iconInput’).addEventListener(‘change’,async(e)=>{
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=()=>{
S.customIcon=reader.result;
sv();
updateIcon();
toast(‘圖示已更新’);
};
reader.readAsDataURL(file);
e.target.value=’’;
});

function updateIcon(){
const preview=document.getElementById(‘iconPreview’);
if(S.customIcon){
preview.innerHTML=`<img src="${S.customIcon}" alt="Custom Icon">`;
}else{
preview.innerHTML=`<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"> <rect width="100" height="100" fill="#0066cc" rx="20"/> <text x="50%" y="55%" font-size="48" fill="#fff" text-anchor="middle" font-weight="bold">課</text> </svg>`;
}
}

// ═══ NOTIFICATIONS ═══
let _nt=[];
let _todoTimers=[];

async function enableNotif(){
if(!(‘Notification’ in window)){toast(‘此瀏覽器不支援通知’);return false;}
return(await Notification.requestPermission())===‘granted’;
}

function schedNotifs(){
_nt.forEach(t=>clearTimeout(t));_nt=[];
if(!S.notif)return;
const c=col();if(c===-1)return;
const now=new Date(),ms=now.getTime();
let cnt=0;
S.periods.forEach(p=>{
const d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),p.sh,p.sm-5,0);
const delay=d-ms;
if(delay>0){
_nt.push(setTimeout(()=>new Notification(‘即將上課’,{body:`第${p.n}節 ${p.s} · ${S.classes[S.periods.indexOf(p)][c]}`}),delay));
cnt++;
}
});
if(cnt) toast(`已設定 ${cnt} 個提醒`);
}

function schedTodoReminders(){
_todoTimers.forEach(t=>clearTimeout(t));_todoTimers=[];
if(!(‘Notification’ in window)||Notification.permission!==‘granted’)return;
const now=new Date().getTime();
S.todos.forEach(t=>{
if(t.done||!t.reminderMinutes||t.reminderMinutes===0)return;
const dueTime=new Date(t.due).getTime();
const remindTime=dueTime-t.reminderMinutes*60000;
const delay=remindTime-now;
if(delay>0){
_todoTimers.push(setTimeout(()=>{
new Notification(‘待辦事項提醒’,{body:`${t.title}\n截止時間：${new Date(t.due).toLocaleString()}`});
},delay));
}
});
}

const ntgl=document.getElementById(‘notifToggle’);
if(S.notif)ntgl.classList.add(‘on’);
ntgl.addEventListener(‘click’,async()=>{
if(!S.notif){
if(await enableNotif()){S.notif=true;ntgl.classList.add(‘on’);sv();schedNotifs();schedTodoReminders();}
else toast(‘請允許通知權限’);
} else {
S.notif=false;ntgl.classList.remove(‘on’);sv();
_nt.forEach(t=>clearTimeout(t));_nt=[];toast(‘已關閉提醒’);
}
});
document.getElementById(‘notifBtn’).addEventListener(‘click’,()=>openM(‘notifModal’));

// ═══ THEME TOGGLE ═══
function toggleTheme(){
S.darkMode=!S.darkMode;
applyTheme();
sv();
toast(S.darkMode?‘已切換至深色模式’:‘已切換至淺色模式’);
}

function applyTheme(){
const root=document.documentElement;
const toggle=document.getElementById(‘themeToggle’);
if(S.darkMode){
root.classList.add(‘dark’);
toggle.classList.add(‘on’);
}else{
root.classList.remove(‘dark’);
toggle.classList.remove(‘on’);
}
// Refresh views to update colors
if(cur===‘weekly’)renderWeekly();
if(cur===‘today’)renderToday();
}

document.getElementById(‘themeToggle’).addEventListener(‘click’,toggleTheme);

// ═══ ROUTING ═══
const VIEWS={
weekly:{el:‘weekly-view’,render:renderWeekly,title:‘課程表’},
today:{el:‘today-view’,render:renderToday,title:‘今天’},
todo:{el:‘todo-view’,render:renderTodo,title:‘待辦 & 行程’},
settings:{el:‘settings-view’,render:()=>{renderSettings();renderTimeEdit();},title:‘設定’},
};
let cur=‘weekly’;

function goTo(id){
if(id===cur)return;
cur=id;
const v=VIEWS[id];
document.querySelectorAll(’.view’).forEach(e=>e.classList.remove(‘active’));
document.getElementById(v.el).classList.add(‘active’);
document.getElementById(‘hTitle’).textContent=v.title;
document.querySelectorAll(’.tab’).forEach(b=>b.classList.toggle(‘active’,b.dataset.v===id));
v.render();
}
document.querySelectorAll(’[data-v]’).forEach(b=>b.addEventListener(‘click’,()=>goTo(b.dataset.v)));

// ═══ INIT ═══
applyTheme();
updateIcon();
renderWeekly();
if(S.notif){schedNotifs();schedTodoReminders();}
setInterval(()=>{if(cur===‘today’)renderToday();},30000);
</script>
