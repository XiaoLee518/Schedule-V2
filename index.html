<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>課程表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:#f5f5f7;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}
.header{background:#fff;padding:12px 16px;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:10;}
.title{font-size:20px;font-weight:700;}
.content{padding:16px;}
.grid{display:grid;grid-template-columns:40px repeat(5,1fr);gap:4px;background:#fff;border-radius:12px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.cell{min-height:60px;border-radius:8px;padding:8px 4px;font-size:11px;text-align:center;display:flex;align-items:center;justify-content:center;}
.time{font-size:10px;color:#666;}
.head{font-weight:700;color:#0066cc;font-size:10px;}
#debug{position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;padding:8px;font-size:10px;max-height:100px;overflow:auto;font-family:monospace;}
</style>
</head>
<body>

<div class="header">
  <div class="title">課程表</div>
</div>

<div class="content">
  <div class="grid" id="grid"></div>
</div>

<div id="debug"></div>

<script>
function log(msg){
  console.log(msg);
  const d=document.getElementById('debug');
  d.innerHTML+=msg+'<br>';
  d.scrollTop=d.scrollHeight;
}

log('開始載入...');

const DAYS=['一','二','三','四','五'];
const PERIODS=[
  {n:1,s:'08:10',e:'09:00'},
  {n:2,s:'09:10',e:'10:00'},
  {n:3,s:'10:10',e:'11:00'},
  {n:4,s:'11:10',e:'12:00'}
];

const CLASSES=[
  ['國文','英文','數學','歷史','生物'],
  ['數學','體育','國文','地理','化學'],
  ['英文','數學','公民','物理','國文'],
  ['歷史','化學','英文','數學','體育']
];

const COLORS={
  '國文':'#ff9f0a',
  '英文':'#0a84ff',
  '數學':'#ff453a',
  '物理':'#bf5af2',
  '化學':'#30d158',
  '生物':'#5ac8fa',
  '歷史':'#ffd60a',
  '地理':'#ff375f',
  '公民':'#64d2ff',
  '體育':'#32d74b'
};

log('資料準備完成');

function render(){
  log('開始渲染...');
  let h='<div class="cell"></div>';
  
  for(let i=0;i<5;i++){
    h+=`<div class="cell head">${DAYS[i]}</div>`;
  }
  
  PERIODS.forEach((p,pi)=>{
    h+=`<div class="cell time">${p.n}<br>${p.s}</div>`;
    for(let d=0;d<5;d++){
      const c=CLASSES[pi][d];
      const color=COLORS[c]||'#666';
      h+=`<div class="cell" style="background:${color}20;color:${color};font-weight:600;">${c}</div>`;
    }
  });
  
  document.getElementById('grid').innerHTML=h;
  log('渲染完成！');
}

try{
  render();
  log('✓ 成功！');
}catch(e){
  log('❌ 錯誤: '+e.message);
}
</script>

</body>
</html>
