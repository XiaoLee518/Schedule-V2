<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>維修中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.container{
background:rgba(255,255,255,0.95);
border-radius:20px;
padding:60px 40px;
text-align:center;
max-width:500px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.icon{
font-size:80px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}
h1{
font-size:32px;
color:#1d1d1f;
margin-bottom:16px;
font-weight:700;
}
p{
font-size:16px;
color:#666;
line-height:1.6;
margin-bottom:12px;
}
.time{
font-size:14px;
color:#999;
margin-top:24px;
}
</style>
</head>
<body>

<div class="container">
<div class="icon">!</div>
<h1>系統維修中</h1>
<p>我們正在進行系統升級</p>
<p>預計很快就會恢復正常</p>
<div class="time">感謝您的耐心等候</div>
</div>

</body>
</html>
